<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Indusalca</title>
    <link rel="icon" type="image/svg+xml" href="catalogo/icono.svg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', sans-serif; background: #f0f4fb; color: #333; overflow-x: hidden; }

    /* ── NAVBAR ── */
    .ps-nav {
        position: fixed; top: 0; width: 100%; height: 68px;
        background: rgba(255,255,255,0.97); backdrop-filter: blur(20px);
        box-shadow: 0 2px 24px rgba(44,90,160,0.1);
        display: flex; align-items: center; z-index: 200;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px; width: 100%; }
    .ps-nav .wrap { display: flex; align-items: center; justify-content: space-between; }
    .ps-back { display: inline-flex; align-items: center; gap: 0.5rem; background: none; border: none; color: #2c5aa0; font-family: 'Poppins',sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: color .2s; }
    .ps-back:hover { color: #dfa403; }
    .ps-nav-logo img { height: 38px; }

    /* ── HERO ── */
    .ps-hero {
        margin-top: 68px; min-height: 280px;
        background: linear-gradient(105deg, #071a3e 0%, #0d2a5e 40%, #1e3f73 70%, #2c5aa0 100%);
        position: relative; overflow: hidden; display: flex; align-items: center;
    }
    .ps-hero-glow { position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 50%, rgba(223,164,3,0.15) 0%, transparent 60%); }
    .ps-hero .wrap { position: relative; z-index: 2; padding: 52px 24px; }
    .ps-crumb { font-size: 0.72rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 2.5px; margin-bottom: 0.7rem; }
    .ps-crumb strong { color: #dfa403; }
    .ps-hero h1 { font-size: 2.4rem; font-weight: 800; color: #fff; line-height: 1.15; margin-bottom: 0.5rem; }
    .ps-hero h1 em { font-style: normal; color: #dfa403; }
    .ps-hero-desc { color: rgba(255,255,255,0.6); font-size: 0.95rem; max-width: 500px; line-height: 1.7; }

    /* ── BRAND SELECTOR ── */
    .ps-brand-section { background: #fff; border-bottom: 1px solid #e4ecf7; padding: 24px 0; }
    .ps-brand-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #aab; margin-bottom: 1rem; }
    .ps-brand-cards { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .ps-brand-card {
        display: flex; align-items: center; gap: 0.8rem;
        padding: 0.7rem 1.3rem; border-radius: 12px;
        border: 2px solid #e4ecf7; background: #f8faff;
        cursor: pointer; transition: all .25s; min-width: 150px;
    }
    .ps-brand-card img { height: 32px; object-fit: contain; filter: grayscale(.5); transition: filter .25s; }
    .ps-brand-card span { font-size: 0.83rem; font-weight: 700; color: #666; transition: color .25s; }
    .ps-brand-card:hover { border-color: #2c5aa0; }
    .ps-brand-card:hover img { filter: none; }
    .ps-brand-card:hover span { color: #2c5aa0; }
    .ps-brand-card.active { border-color: #dfa403; background: #fffbee; box-shadow: 0 4px 16px rgba(223,164,3,.18); }
    .ps-brand-card.active img { filter: none; }
    .ps-brand-card.active span { color: #0d2a5e; font-weight: 800; }

    /* ── MAIN ── */
    .ps-main { padding: 36px 0 80px; }
    .ps-count { font-size: 0.8rem; color: #999; margin-bottom: 1.6rem; }
    .ps-count strong { color: #2c5aa0; }

    /* ── PRODUCT LIST (horizontal cards) ── */
    .ps-list { display: flex; flex-direction: column; gap: 1.4rem; }

    .ps-card {
        background: #fff; border-radius: 20px; overflow: hidden;
        box-shadow: 0 4px 24px rgba(44,90,160,0.07);
        border: 1px solid #e8eef7;
        display: grid; grid-template-columns: 280px 1fr;
        transition: all .3s ease; position: relative;
    }
    .ps-card::before {
        content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
        background: linear-gradient(180deg, #2c5aa0, #dfa403);
        transform: scaleY(0); transform-origin: top; transition: transform .3s ease;
    }
    .ps-card:hover { box-shadow: 0 16px 48px rgba(44,90,160,0.14); transform: translateY(-3px); border-color: transparent; }
    .ps-card:hover::before { transform: scaleY(1); }

    /* Image panel */
    .ps-card-img {
        background: linear-gradient(135deg, #f0f4fb 0%, #e8eef7 100%);
        display: flex; align-items: center; justify-content: center;
        padding: 2rem; overflow: hidden; position: relative; min-height: 220px;
        cursor: pointer;
    }
    .ps-card-img::after {
        content: ''; position: absolute; inset: 0;
        background: radial-gradient(ellipse at 50% 110%, rgba(44,90,160,0.08) 0%, transparent 65%);
    }
    .ps-card-img img {
        max-height: 180px; max-width: 100%; object-fit: contain;
        transition: transform .4s ease; position: relative; z-index: 1;
        filter: drop-shadow(0 8px 20px rgba(0,0,0,0.12));
    }
    .ps-card:hover .ps-card-img img { transform: scale(1.07) translateY(-4px); }

    /* Lupa sobre imagen */
    .ps-zoom-btn {
        position: absolute; bottom: 12px; right: 12px; z-index: 2;
        width: 36px; height: 36px; border-radius: 50%;
        background: rgba(255,255,255,0.9); border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        color: #2c5aa0; font-size: 0.9rem;
        box-shadow: 0 2px 10px rgba(44,90,160,0.2);
        opacity: 0; transform: scale(0.8);
        transition: all .25s ease;
    }
    .ps-card:hover .ps-zoom-btn { opacity: 1; transform: scale(1); }
    .ps-zoom-btn:hover { background: #2c5aa0; color: #fff; transform: scale(1.1) !important; }

    /* Info panel */
    .ps-card-info { padding: 2rem 2.2rem; display: flex; flex-direction: column; justify-content: center; gap: 0.7rem; }

    .ps-card-brand { display: flex; align-items: center; gap: 0.5rem; }
    .ps-card-brand img { height: 22px; object-fit: contain; }

    .ps-card-name { font-size: 1.2rem; font-weight: 800; color: #0d2a5e; line-height: 1.25; }

    .ps-card-pres {
        display: inline-flex; align-items: center; gap: 0.4rem;
        background: #eef3fb; color: #2c5aa0;
        font-size: 0.72rem; font-weight: 700;
        padding: 0.3rem 0.9rem; border-radius: 50px;
        text-transform: uppercase; letter-spacing: 0.5px; width: fit-content;
    }

    .ps-card-divider { height: 1px; background: #f0f4fb; margin: 0.3rem 0; }

    .ps-card-desc { font-size: 0.88rem; color: #666; line-height: 1.65; }

    .ps-card-footer { display: flex; align-items: center; gap: 1rem; margin-top: 0.5rem; flex-wrap: wrap; }

    .ps-btn-ficha {
        display: inline-flex; align-items: center; gap: 0.5rem;
        background: linear-gradient(135deg, #2c5aa0, #1e3f73);
        color: #fff; border: none; border-radius: 50px;
        padding: 0.65rem 1.5rem; font-family: 'Poppins',sans-serif;
        font-size: 0.82rem; font-weight: 700; cursor: pointer;
        transition: all .25s; box-shadow: 0 4px 14px rgba(44,90,160,0.3);
    }
    .ps-btn-ficha:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(44,90,160,0.4); }

    .ps-sector-tag {
        display: inline-flex; align-items: center; gap: 0.4rem;
        font-size: 0.72rem; color: #aab; font-weight: 600;
    }

    /* ── MODAL FICHA TÉCNICA ── */
    .ps-modal-overlay {
        position: fixed; inset: 0; background: rgba(10,20,50,0.65);
        backdrop-filter: blur(6px); z-index: 1000;
        display: flex; align-items: center; justify-content: center;
        padding: 1.5rem; opacity: 0; pointer-events: none;
        transition: opacity .25s ease;
    }
    .ps-modal-overlay.open { opacity: 1; pointer-events: all; }

    .ps-modal {
        background: #fff; border-radius: 22px; width: 100%; max-width: 620px;
        max-height: 88vh; overflow: hidden; display: flex; flex-direction: column;
        box-shadow: 0 30px 80px rgba(0,0,0,0.25);
        transform: translateY(30px) scale(0.97);
        transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    .ps-modal-overlay.open .ps-modal { transform: translateY(0) scale(1); }

    .ps-modal-head {
        background: linear-gradient(105deg, #0d2a5e, #2c5aa0);
        padding: 1.6rem 2rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
    }
    .ps-modal-head-left { display: flex; flex-direction: column; gap: 0.4rem; }
    .ps-modal-head img { height: 24px; object-fit: contain; filter: brightness(0) invert(1) opacity(.7); }
    .ps-modal-head h3 { font-size: 1.1rem; font-weight: 700; color: #fff; line-height: 1.3; }
    .ps-modal-head .ps-modal-pres { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
    .ps-modal-close {
        background: rgba(255,255,255,0.15); border: none; color: #fff;
        width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem; transition: background .2s; flex-shrink: 0;
    }
    .ps-modal-close:hover { background: rgba(255,255,255,0.3); }

    .ps-modal-body { padding: 1.8rem 2rem; overflow-y: auto; flex: 1; }

    .ps-modal-specs-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #aab; margin-bottom: 0.8rem; }
    .ps-modal-table { width: 100%; border-collapse: collapse; }
    .ps-modal-table tr { border-bottom: 1px solid #f0f4fb; }
    .ps-modal-table tr:last-child { border-bottom: none; }
    .ps-modal-table .ml { font-weight: 600; color: #2c5aa0; padding: 0.55rem 1rem 0.55rem 0; width: 40%; font-size: 0.82rem; vertical-align: top; }
    .ps-modal-table .mv { color: #444; padding: 0.55rem 0; font-size: 0.82rem; line-height: 1.5; }
    .ps-modal-table tr:nth-child(even) { background: #f8faff; }
    .ps-modal-table tr:nth-child(even) .ml,
    .ps-modal-table tr:nth-child(even) .mv { padding-left: 0.5rem; }

    /* ── LIGHTBOX imagen ── */
    .ps-lightbox {
        position: fixed; inset: 0; background: rgba(5,10,30,0.92);
        backdrop-filter: blur(8px); z-index: 2000;
        display: flex; align-items: center; justify-content: center;
        padding: 2rem; opacity: 0; pointer-events: none;
        transition: opacity .25s ease;
    }
    .ps-lightbox.open { opacity: 1; pointer-events: all; }
    .ps-lightbox img {
        max-width: 90vw; max-height: 85vh; object-fit: contain;
        border-radius: 12px; box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        transform: scale(0.92); transition: transform .3s cubic-bezier(.4,0,.2,1);
        filter: drop-shadow(0 0 40px rgba(255,255,255,0.05));
    }
    .ps-lightbox.open img { transform: scale(1); }
    .ps-lightbox-close {
        position: absolute; top: 1.2rem; right: 1.2rem;
        background: rgba(255,255,255,0.12); border: none; color: #fff;
        width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.1rem; transition: background .2s;
    }
    .ps-lightbox-close:hover { background: rgba(255,255,255,0.25); }

    /* ── WHATSAPP FLOTANTE ── */
    .ps-wa-float {
        position: fixed; bottom: 28px; right: 28px; z-index: 500;
    }
    .ps-wa-btn {
        width: 58px; height: 58px; border-radius: 50%;
        background: #25d366; border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 6px 24px rgba(37,211,102,0.45);
        transition: all .3s ease; text-decoration: none; color: #fff;
        font-size: 1.6rem;
    }
    .ps-wa-btn:hover { transform: scale(1.1); box-shadow: 0 10px 32px rgba(37,211,102,0.6); }
    .ps-wa-pulse {
        position: absolute; inset: 0; border-radius: 50%;
        background: rgba(37,211,102,0.4);
        animation: waPulse 2s ease-out infinite;
    }
    @keyframes waPulse { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(1.8);opacity:0} }

    /* ── EMPTY ── */
    .ps-empty { text-align: center; padding: 5rem 2rem; }
    .ps-empty-icon { width: 80px; height: 80px; background: #eef3fb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.2rem; }
    .ps-empty-icon i { font-size: 2rem; color: #2c5aa0; }
    .ps-empty h3 { color: #444; margin-bottom: 0.4rem; }
    .ps-empty p { color: #aaa; font-size: 0.9rem; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
        .ps-hero h1 { font-size: 1.7rem; }
        .ps-card { grid-template-columns: 1fr; }
        .ps-card-img { min-height: 200px; }
        .ps-card::before { top: 0; left: 0; right: 0; bottom: auto; width: auto; height: 4px; transform: scaleX(0); transform-origin: left; }
        .ps-card:hover::before { transform: scaleX(1); }
        .ps-modal-head h3 { font-size: 1rem; }
    }
    @media (max-width: 480px) {
        .ps-card-info { padding: 1.4rem; }
        .ps-modal-body { padding: 1.2rem 1.4rem; }
        .ps-modal-footer { padding: 1rem 1.4rem; }
    }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="ps-nav">
    <div class="wrap">
        <button class="ps-back" onclick="history.back()"><i class="fas fa-arrow-left"></i> Volver</button>
        <div class="ps-nav-logo"><a href="index.html"><img src="catalogo/logo1.png" alt="Indusalca"></a></div>
        <div style="width:80px"></div>
    </div>
</nav>

<!-- Hero -->
<section class="ps-hero">
    <div class="ps-hero-glow"></div>
    <div class="wrap">
        <p class="ps-crumb">Indusalca &rsaquo; Sectores &rsaquo; <strong id="heroSector">—</strong></p>
        <h1 id="heroTitle">Productos de <em>este sector</em></h1>
        <p class="ps-hero-desc">Selecciona una marca para explorar el catálogo disponible.</p>
    </div>
</section>

<!-- Brand selector -->
<div class="ps-brand-section">
    <div class="wrap">
        <p class="ps-brand-label">Selecciona una marca</p>
        <div class="ps-brand-cards" id="brandCards"></div>
    </div>
</div>

<!-- Products -->
<main class="ps-main">
    <div class="wrap">
        <p class="ps-count"><strong id="prodCount">0</strong> productos disponibles</p>
        <div class="ps-list" id="productList"></div>
    </div>
</main>

<!-- Modal ficha técnica -->
<div class="ps-modal-overlay" id="fichaModal" onclick="closeFicha(event)">
    <div class="ps-modal" id="fichaContent">
        <div class="ps-modal-head">
            <div class="ps-modal-head-left">
                <h3 id="fichaNombre"></h3>
                <span class="ps-modal-pres" id="fichaDesc"></span>
            </div>
            <button class="ps-modal-close" onclick="closeFichaBtn()"><i class="fas fa-times"></i></button>
        </div>
        <div class="ps-modal-body">
            <p class="ps-modal-specs-title">Especificaciones técnicas</p>
            <table class="ps-modal-table" id="fichaTable"></table>
        </div>
    </div>
</div>

<!-- Lightbox imagen -->
<div class="ps-lightbox" id="psLightbox" onclick="closeLightbox()">
    <button class="ps-lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
    <img id="psLightboxImg" src="" alt="">
</div>

<!-- WhatsApp flotante -->
<div class="ps-wa-float">
    <div class="ps-wa-pulse"></div>
    <a href="https://wa.me/584140060054?text=Hola,%20me%20gustaría%20obtener%20información%20sobre%20sus%20productos"
       target="_blank" class="ps-wa-btn" title="Contáctanos por WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>
</div>

<script src="script.js"></script>
<script>
    const params        = new URLSearchParams(location.search);
    const currentSector = params.get('sector') || '';
    let   activeBrand   = params.get('marca')  || '';

    const BRAND_ORDER   = ['monte-blanco', 'cruz-de-oro', 'condor'];
    const sectorData    = productCatalogs[currentSector] || {};
    const availableBrands = BRAND_ORDER.filter(b => sectorData[b]);

    // Hero
    const sectorLabel = sectorTitles[currentSector] || currentSector;
    document.getElementById('heroSector').textContent = sectorLabel;
    document.getElementById('heroTitle').innerHTML    = `Productos de <em>${sectorLabel}</em>`;

    if (!activeBrand || !sectorData[activeBrand]) activeBrand = availableBrands[0] || '';

    // Brand cards
    const cardsEl = document.getElementById('brandCards');
    availableBrands.forEach(bk => {
        const b = brandConfig[bk];
        if (!b) return;
        const card = document.createElement('button');
        card.className = 'ps-brand-card' + (bk === activeBrand ? ' active' : '');
        card.dataset.brand = bk;
        card.innerHTML = `<img src="${b.logo}" alt="${b.label}"><span>${b.label}</span>`;
        card.addEventListener('click', () => switchBrand(bk));
        cardsEl.appendChild(card);
    });

    function switchBrand(bk) {
        activeBrand = bk;
        history.replaceState(null, '', `?sector=${currentSector}&marca=${bk}`);
        document.querySelectorAll('.ps-brand-card').forEach(c => c.classList.toggle('active', c.dataset.brand === bk));
        renderProducts(bk);
    }

    // Render productos
    function renderProducts(brandKey) {
        const list     = document.getElementById('productList');
        const products = sectorData[brandKey] || [];
        const brand    = brandConfig[brandKey] || {};

        document.getElementById('prodCount').textContent = products.length;

        if (!products.length) {
            list.innerHTML = `
            <div class="ps-empty">
                <div class="ps-empty-icon"><i class="fas fa-box-open"></i></div>
                <h3>Sin productos registrados</h3>
                <p>No hay productos disponibles para esta selección.</p>
            </div>`;
            return;
        }

        list.innerHTML = products.map((p, i) => {
            const idx = `${currentSector}-${brandKey}-${i}`;
            return `
            <div class="ps-card">
                <div class="ps-card-img" onclick="openLightbox('${p.image}','${p.name}')">
                    <img src="${p.image}" alt="${p.name}" loading="lazy">
                    <button class="ps-zoom-btn" title="Ver imagen ampliada" onclick="event.stopPropagation();openLightbox('${p.image}','${p.name}')">
                        <i class="fas fa-search-plus"></i>
                    </button>
                </div>
                <div class="ps-card-info">
                    <div class="ps-card-brand">
                        <img src="${brand.logo}" alt="${brand.label}">
                    </div>
                    <p class="ps-card-name">${p.name}</p>
                    <span class="ps-card-pres"><i class="fas fa-box"></i> ${p.description}</span>
                    <div class="ps-card-divider"></div>
                    <div class="ps-card-footer">
                        <button class="ps-btn-ficha" onclick="openFicha('${idx}','${brandKey}')">
                            <i class="fas fa-file-alt"></i> Ver ficha técnica
                        </button>
                        <span class="ps-sector-tag"><i class="fas fa-industry"></i> ${sectorLabel}</span>
                    </div>
                </div>
            </div>`;
        }).join('');

        // Guarda productos en memoria para el modal
        window._psProducts = window._psProducts || {};
        window._psProducts[`${currentSector}-${brandKey}`] = products;
    }

    // Modal ficha técnica
    function openFicha(idx, brandKey) {
        const [sector, bk, i] = idx.split('-').reduce((acc, v, j, arr) => {
            // idx = "sector-brandKey-index" pero sector y brandKey pueden tener guiones
            return acc;
        }, []);

        // Reconstruir correctamente
        const parts    = idx.split('-');
        const pIdx     = parseInt(parts[parts.length - 1]);
        const bkKey    = brandKey;
        const products = sectorData[bkKey] || [];
        const p        = products[pIdx];
        const brand    = brandConfig[bkKey] || {};

        if (!p) return;

        const specs = typeof getTechnicalDetails === 'function' ? getTechnicalDetails(p) : [];

        document.getElementById('fichaNombre').textContent    = p.name;
        document.getElementById('fichaDesc').textContent      = p.description;

        const table = document.getElementById('fichaTable');
        if (specs.length) {
            table.innerHTML = specs.map(s =>
                `<tr><td class="ml">${s.label}</td><td class="mv">${s.value}</td></tr>`
            ).join('');
        } else {
            table.innerHTML = `<tr><td class="ml" colspan="2" style="color:#bbb;font-style:italic;padding:.8rem 0">Ficha técnica no disponible para este producto.</td></tr>`;
        }

        document.getElementById('fichaModal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeFichaBtn() {
        document.getElementById('fichaModal').classList.remove('open');
        document.body.style.overflow = '';
    }

    function closeFicha(e) {
        if (e.target === document.getElementById('fichaModal')) closeFichaBtn();
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeFichaBtn(); closeLightbox(); }
    });

    // Lightbox
    function openLightbox(src, alt) {
        const lb = document.getElementById('psLightbox');
        const img = document.getElementById('psLightboxImg');
        img.src = src; img.alt = alt;
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        document.getElementById('psLightbox').classList.remove('open');
        document.body.style.overflow = '';
    }

    // Render inicial
    if (activeBrand) renderProducts(activeBrand);
</script>
</body>
</html>
