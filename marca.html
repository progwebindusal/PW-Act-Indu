<!DOCTYPE html>

<style>

/* PRODUCTOS */
.m-grid { display: flex; flex-direction: column; gap: 1.4rem; }

/* MODAL */
.m-modal-overlay { position: fixed; inset: 0; background: rgba(10,20,50,0.7); backdrop-filter: blur(6px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity .25s; }
.m-modal-overlay.open { opacity: 1; pointer-events: all; }
.m-modal { background: #fff; border-radius: 22px; width: 100%; max-width: 600px; max-height: 88vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 30px 80px rgba(0,0,0,0.3); transform: translateY(30px) scale(0.97); transition: transform .3s cubic-bezier(.4,0,.2,1); }
.m-modal-overlay.open .m-modal { transform: translateY(0) scale(1); }
.m-modal-head { padding: 1.5rem 2rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
.m-modal-head h3 { font-size: 1.05rem; font-weight: 700; color: #fff; line-height: 1.3; }

/* LIGHTBOX */

.m-wa a { width: 56px; height: 56px; border-radius: 50%; background: #25d366; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; box-shadow: 0 6px 24px rgba(37,211,102,0.45); transition: all .3s; text-decoration: none; position: relative; z-index: 1; }

/* EMPTY */

<script src="script.js"></script>
<script>
const params   = new URLSearchParams(location.search);
const brandKey = params.get('marca') || 'monte-blanco';
const brand    = brandConfig[brandKey];

const brandInfo = {
    'monte-blanco': {
        eyebrow: 'Marca Principal',
        desc: 'Sal purificada recristalizada al vacío, eliminando impurezas para garantizar un producto de alta calidad para el consumo humano y agroindustrial.',
        pills: ['Recristalizada al vacío', 'Sin impurezas', 'Grano uniforme'],
        heroBg: 'linear-gradient(135deg, #071a3e 0%, #0d2a5e 50%, #1e3f73 100%)',
        heroOverlay: 'radial-gradient(ellipse at 75% 50%, rgba(44,90,160,0.35) 0%, transparent 65%)',
        particleColor: 'rgba(180,215,255,',
        stats: [
            { num: '99.5%', label: 'Pureza NaCl' },
            { num: '0.3%', label: 'Humedad máx.' },
            { num: 'Vacío', label: 'Proceso' },
            { num: '73+', label: 'Años de calidad' }
        ]
    },
    'cruz-de-oro': {
        eyebrow: 'Sal Refinada',
        desc: 'Sal refinada de alta pureza, en cuya elaboración se eliminan las impurezas, garantizando un producto de calidad para el consumo humano e industrial.',
        pills: ['Sal molida en húmedo', 'Libre de impurezas', 'Alta calidad'],
        heroBg: 'linear-gradient(135deg, #1a0800 0%, #3d1a00 50%, #7a3500 100%)',
        heroOverlay: 'radial-gradient(ellipse at 75% 50%, rgba(223,164,3,0.3) 0%, transparent 65%)',
        particleColor: 'rgba(255,215,0,',
        stats: [
            { num: '99%', label: 'Pureza NaCl' },
            { num: '0.3%', label: 'Humedad máx.' },
            { num: 'Húmedo', label: 'Proceso' },
            { num: '73+', label: 'Años de calidad' }
        ]
    },
    'condor': {
        eyebrow: 'Sal Marina Gourmet',
        desc: 'Sal Marina con grano grueso ideal y especial para todo tipo de carnes y pescados, ofreciendo ese toque de sabor auténtico y natural.',
        pills: ['Sal Marina auténtica', 'Grano grueso', 'Ideal para carnes y pescados'],
        heroBg: 'linear-gradient(135deg, #1a0000 0%, #4a0000 50%, #8b0000 100%)',
        heroOverlay: 'radial-gradient(ellipse at 75% 50%, rgba(180,0,0,0.25) 0%, transparent 65%)',
        particleColor: 'rgba(255,140,0,',
        stats: [
            { num: '98%', label: 'Pureza NaCl' },
            { num: '5%', label: 'Humedad máx.' },
            { num: 'Marina', label: 'Origen' },
            { num: '73+', label: 'Años de calidad' }
        ]
    }
};

const info = brandInfo[brandKey] || brandInfo['monte-blanco'];

// Hero
document.getElementById('heroLogo').src = brand?.logo || '';
document.getElementById('heroLogo').alt = brand?.label || '';
document.getElementById('heroEyebrow').textContent = info.eyebrow;
document.getElementById('heroName').textContent = brand?.label || '';
document.getElementById('heroDesc').textContent = info.desc;
document.getElementById('heroBg').style.background = info.heroBg;
document.getElementById('heroOverlay').style.background = info.heroOverlay;
document.title = `${brand?.label || 'Marca'} - Indusalca`;

info.pills.forEach(t => {
    const el = document.createElement('span');
    el.className = 'm-pill';
    el.innerHTML = `<i class="fas fa-check-circle" style="color:#dfa403"></i> ${t}`;
    document.getElementById('heroPills').appendChild(el);
});

// Canvas partículas hero
(function() {
    const canvas = document.getElementById('heroCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
    resize(); window.addEventListener('resize', resize);
    const pc = info.particleColor;
    const particles = Array.from({length: 35}, () => ({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        s: Math.random() * 4 + 2, vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4,
        a: Math.random()*.4+.15, r: Math.random()*45
    }));
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy;
            if (p.x<0||p.x>canvas.width) p.vx*=-1;
            if (p.y<0||p.y>canvas.height) p.vy*=-1;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.r * Math.PI/180);
            ctx.fillStyle = pc + p.a + ')';
            ctx.strokeStyle = 'rgba(255,255,255,' + (p.a*.6) + ')';
            ctx.lineWidth = .5;
            ctx.beginPath();
            ctx.rect(-p.s/2, -p.s/2, p.s, p.s);
            ctx.fill(); ctx.stroke();
            ctx.restore();
        });
        requestAnimationFrame(draw);
    }
    draw();
})();

// Stats
const statsGrid = document.getElementById('statsGrid');
info.stats.forEach(s => {
    statsGrid.innerHTML += `<div class="m-stat"><div class="m-stat-num">${s.num}</div><div class="m-stat-label">${s.label}</div></div>`;
});

// Sectores
const sectorIcons = {
    agroindustria:'catalogo/icono/agroindustria.png', hogar:'catalogo/icono/hogar.png',
    quesera:'catalogo/icono/queso.png', industria:'catalogo/icono/industria.png',
    textil:'catalogo/icono/textil.png', aguas:'catalogo/icono/aguas.png',
    petrolera:'catalogo/icono/petroleo.png', agraria:'catalogo/icono/animal.png',
    piscinas:'catalogo/icono/piscinas.png', farmaceutica:'catalogo/icono/farmacia.png',
    salmuera:'catalogo/icono/salmura.png'
};
const sectorsGrid = document.getElementById('sectorsGrid');
Object.entries(productCatalogs).forEach(([sector, brands]) => {
    if (!brands[brandKey]?.length) return;
    sectorsGrid.innerHTML += `
    <div class="m-sector-card">
        <img src="${sectorIcons[sector]||''}" alt="${sectorTitles[sector]||sector}">
        <span>${sectorTitles[sector]||sector}</span>
    </div>`;
});

// Productos (sin duplicados por nombre)
const seen = new Set(), allProducts = [];
Object.entries(productCatalogs).forEach(([,brands]) => {
    (brands[brandKey]||[]).forEach(p => {
        if (!seen.has(p.name)) { seen.add(p.name); allProducts.push(p); }
    });
});
document.getElementById('productsCount').textContent = `${allProducts.length} producto${allProducts.length!==1?'s':''} disponibles`;

const grid = document.getElementById('productsGrid');
if (!allProducts.length) {
    grid.innerHTML = `<div class="m-empty"><i class="fas fa-box-open"></i><p>No hay productos registrados.</p></div>`;
} else {
    grid.innerHTML = allProducts.map((p,i) => `
    <div class="m-card">
        <div class="m-card-img" onclick="openLightbox('${p.image}','${p.name}')">
            <img src="${p.image}" alt="${p.name}" loading="lazy">
            <button class="m-zoom-btn" onclick="event.stopPropagation();openLightbox('${p.image}','${p.name}')"><i class="fas fa-search-plus"></i></button>
        </div>
        <div class="m-card-info">
            <p class="m-card-name">${p.name}</p>
            <span class="m-card-pres"><i class="fas fa-box"></i> ${p.description}</span>
            <div class="m-card-divider"></div>
            <button class="m-btn-ficha" onclick="openFicha(${i})"><i class="fas fa-file-alt"></i> Ver ficha técnica</button>
        </div>
    </div>`).join('');
}

// Modal color por marca
const modalColors = { 'monte-blanco':'linear-gradient(105deg,#0d2a5e,#2c5aa0)', 'cruz-de-oro':'linear-gradient(105deg,#3d1a00,#7a3500)', 'condor':'linear-gradient(105deg,#1a0000,#8b0000)' };
document.getElementById('fichaHead').style.background = modalColors[brandKey] || modalColors['monte-blanco'];

function openFicha(i) {
    const p = allProducts[i]; if (!p) return;
    const specs = typeof getTechnicalDetails==='function' ? getTechnicalDetails(p) : [];
    document.getElementById('fichaNombre').textContent = p.name;
    document.getElementById('fichaDesc').textContent   = p.description;
    document.getElementById('fichaTable').innerHTML = specs.length
        ? specs.map(s=>`<tr><td class="sl">${s.label}</td><td class="sv">${s.value}</td></tr>`).join('')
        : `<tr><td class="sl" colspan="2" style="color:#bbb;font-style:italic">Ficha técnica no disponible.</td></tr>`;
    document.getElementById('fichaModal').classList.add('open');
    document.body.style.overflow = 'hidden';
}
function closeFichaBtn() { document.getElementById('fichaModal').classList.remove('open'); document.body.style.overflow=''; }
function closeFicha(e) { if (e.target===document.getElementById('fichaModal')) closeFichaBtn(); }
function openLightbox(src,alt) { document.getElementById('lightboxImg').src=src; document.getElementById('lightboxImg').alt=alt; document.getElementById('lightbox').classList.add('open'); document.body.style.overflow='hidden'; }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow=''; }
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){closeFichaBtn();closeLightbox();} });
</script>
</body>
</html>
